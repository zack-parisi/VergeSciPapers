version: '3.8'

services:
  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: verge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - verge_network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # MongoDB service (local, not used by API when using Atlas)
  # mongodb:
  #   image: mongo:6.0
  #   container_name: verge_mongodb
  #   restart: unless-stopped
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: admin
  #     MONGO_INITDB_ROOT_PASSWORD: password
  #   volumes:
  #     - mongodb_data:/data/db
  #   networks:
  #     - verge_network
  #   command: mongod --wiredTigerCacheSizeGB 1

  # Flask API backend (scalable)
  api:
    build:
      context: .
      dockerfile: verge_api/Dockerfile
    container_name: verge_api
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - FLASK_ENV=production
      - CACHE_TTL=300
      - MAX_WORKERS=4
    depends_on:
      - redis
    networks:
      - verge_network
    volumes:
      - ./config.json:/app/config.json:ro
      - ./api_logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Load balancer (optional for multiple API instances)
  nginx:
    image: nginx:alpine
    container_name: verge_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - verge_network
    profiles:
      - production

  # Scraper service
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verge_scraper
    restart: "no"
    environment:
      - MONGO_URI=${MONGO_URI}
      - PYTHONPATH=/app
    networks:
      - verge_network
    volumes:
      - ./config.json:/app/config.json:ro
      - ./scraping.log:/app/scraping.log
    command: python run_scalable.py
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

volumes:
  redis_data:

networks:
  verge_network:
    driver: bridge
